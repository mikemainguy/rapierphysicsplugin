name: Bug Report
description: Report a bug in rapierphysicsplugin
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior
      placeholder: |
        1. Create a scene with...
        2. Add physics body...
        3. Connect client...
        4. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: |
        Paste the output of: node -e "console.log(process.version, process.platform, process.arch)"
        And relevant package versions.
      placeholder: |
        Node.js: v20.x.x
        Platform: darwin (arm64)
        @rapierphysicsplugin/client: 1.0.13
        @babylonjs/core: 8.0.0
    validations:
      required: false
